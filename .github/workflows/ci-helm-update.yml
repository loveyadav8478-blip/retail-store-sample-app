name: CI - Build & Update Helm Chart

on:
  push:
    branches: [gitops]
    paths: ['src/**']
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cart: ${{ steps.filter.outputs.cart }}
      catalog: ${{ steps.filter.outputs.catalog }}
      checkout: ${{ steps.filter.outputs.checkout }}
      orders: ${{ steps.filter.outputs.orders }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cart:
              - 'src/cart/src/**'
              - 'src/cart/Dockerfile'
              - 'src/cart/pom.xml'
            catalog:
              - 'src/catalog/**/*.go'
              - 'src/catalog/Dockerfile'
              - 'src/catalog/go.mod'
            checkout:
              - 'src/checkout/src/**'
              - 'src/checkout/Dockerfile'
              - 'src/checkout/package.json'
            orders:
              - 'src/orders/src/**'
              - 'src/orders/Dockerfile'
              - 'src/orders/pom.xml'
            ui:
              - 'src/ui/src/**'
              - 'src/ui/Dockerfile'
              - 'src/ui/pom.xml'

  build-and-update:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.cart == 'true' ||
      needs.detect-changes.outputs.catalog == 'true' ||
      needs.detect-changes.outputs.checkout == 'true' ||
      needs.detect-changes.outputs.orders == 'true' ||
      needs.detect-changes.outputs.ui == 'true'
    strategy:
      matrix:
        service:
          - name: cart
            changed: ${{ needs.detect-changes.outputs.cart }}
            ecr_repo: retail-store-sample-cart
          - name: catalog
            changed: ${{ needs.detect-changes.outputs.catalog }}
            ecr_repo: retail-store-sample-catalog
          - name: checkout
            changed: ${{ needs.detect-changes.outputs.checkout }}
            ecr_repo: retail-store-sample-checkout
          - name: orders
            changed: ${{ needs.detect-changes.outputs.orders }}
            ecr_repo: retail-store-sample-orders
          - name: ui
            changed: ${{ needs.detect-changes.outputs.ui }}
            ecr_repo: retail-store-sample-ui
    steps:
      - name: Checkout
        if: matrix.service.changed == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: matrix.service.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: matrix.service.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        if: matrix.service.changed == 'true'
        id: tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: matrix.service.changed == 'true'
        run: |
          docker build -t $ECR_REGISTRY/${{ matrix.service.ecr_repo }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            src/${{ matrix.service.name }}
          docker push $ECR_REGISTRY/${{ matrix.service.ecr_repo }}:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Update Helm chart values.yaml
        if: matrix.service.changed == 'true'
        run: |
          sed -i "s|tag:.*|tag: \"${{ steps.tag.outputs.IMAGE_TAG }}\"|" \
            src/${{ matrix.service.name }}/chart/values.yaml

      - name: Commit updated Helm values
        if: matrix.service.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/${{ matrix.service.name }}/chart/values.yaml
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service.name }} image tag to ${{ steps.tag.outputs.IMAGE_TAG }}"

      - name: Push changes
        if: matrix.service.changed == 'true'
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
